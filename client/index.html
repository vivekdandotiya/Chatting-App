<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="A modern, secure real-time chat application" />
    <meta name="theme-color" content="#0c0c0c" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/png" href="/fevicon.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/fevicon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Varta • Modern Chat</title>
    <script>
  (function() {
    const WEBSITE_ID = 'varta';
    const DASHBOARD_URL = 'https://real-time-dashboard-three.vercel.app';
    
    function sendEvent(level, message, details = {}) {
      fetch(DASHBOARD_URL + '/api/logs', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        mode: 'cors',
        body: JSON.stringify({
          websiteId: WEBSITE_ID,
          level: level,
          service: 'Client Browser',
          message: message,
          details: details
        })
      }).catch(err => {});
    }

    // 1. Capture uncaught errors
    window.addEventListener('error', function(event) {
      sendEvent('ERROR', 'Uncaught Error: ' + event.message, {
        filename: event.filename,
        lineno: event.lineno,
        colno: event.colno,
        stack: event.error ? event.error.stack : null
      });
    });

    // 2. Capture unhandled promise rejections
    window.addEventListener('unhandledrejection', function(event) {
      sendEvent('ERROR', 'Unhandled Promise Rejection: ' + event.reason, {
        reason: String(event.reason)
      });
    });

    // 3. Intercept console prints automatically
    const originalLog = console.log;
    const originalWarn = console.warn;
    const originalError = console.error;
    let inConsoleInterceptor = false;

    console.log = function(...args) {
      originalLog.apply(console, args);
      if (inConsoleInterceptor) return;
      inConsoleInterceptor = true;
      try {
        const msg = args.map(arg => typeof arg === 'object' ? JSON.stringify(arg) : String(arg)).join(' ');
        sendEvent('INFO', msg);
      } catch (e) {}
      inConsoleInterceptor = false;
    };

    console.warn = function(...args) {
      originalWarn.apply(console, args);
      if (inConsoleInterceptor) return;
      inConsoleInterceptor = true;
      try {
        const msg = args.map(arg => typeof arg === 'object' ? JSON.stringify(arg) : String(arg)).join(' ');
        sendEvent('WARN', msg);
      } catch (e) {}
      inConsoleInterceptor = false;
    };

    console.error = function(...args) {
      originalError.apply(console, args);
      if (inConsoleInterceptor) return;
      inConsoleInterceptor = true;
      try {
        const msg = args.map(arg => typeof arg === 'object' ? JSON.stringify(arg) : String(arg)).join(' ');
        sendEvent('ERROR', msg);
      } catch (e) {}
      inConsoleInterceptor = false;
    };

    // 4. Expose global logger for custom events
    window.dashLogger = {
      info: (msg, details) => sendEvent('INFO', msg, details),
      warn: (msg, details) => sendEvent('WARN', msg, details),
      error: (msg, details) => sendEvent('ERROR', msg, details)
    };
  })();
</script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
